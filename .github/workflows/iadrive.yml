name: Archive Drive link to IA

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'drive URL to archive'
        required: true
        default: 'https://drive'

jobs:
  archive:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v 6.2.0
      with:
        python-version: '3.x'

    - name: Cache pip
      uses: actions/cache@565629816435f6c0b50676926c9b05c254113c0c # v 5.0.3
      with:
        path: |
          ~/.cache/pip
        key: ${{ runner.os }}-archive-cache-${{ hashFiles('.github/workflows/tubeup.yml') }}
        restore-keys: |
          ${{ runner.os }}-archive-cache-

    - name: Install iadrive and IA CLI
      run: |
        python -m pip install --upgrade pip
        pip install iadrive

    - name: Configure IA CLI
      env:
        IA_EMAIL: ${{ secrets.IA_EMAIL }}
        IA_PASSWORD: ${{ secrets.IA_PASSWORD }}
      run: |
        printf "%s\n%s\n" "$IA_EMAIL" "$IA_PASSWORD" | ia configure

    - name: Run iadrive
      run: |
        iadrive "${{ github.event.inputs.url }}"
