name: Crawl incremental

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: crawl-incremental
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: HTTP trigger
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          INTERNAL_CRAWL_KEY: ${{ secrets.INTERNAL_CRAWL_KEY }}
        run: |
          if [ -z "$SITE_URL" ] || [ -z "$INTERNAL_CRAWL_KEY" ]; then
            echo "Missing SITE_URL or INTERNAL_CRAWL_KEY repo secrets"
            exit 1
          fi
          curl -fsS -G "$SITE_URL/internal/crawl" \
            --data-urlencode "key=$INTERNAL_CRAWL_KEY"
