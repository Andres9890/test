name: IPA analysis

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'IPA URL to download'
        required: true
        default: 'https://'

jobs:
  anylyize:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v 6.2.0
      with:
        python-version: '3.x'

    - name: Cache pip
      uses: actions/cache@565629816435f6c0b50676926c9b05c254113c0c # v 5.0.3
      with:
        path: |
          ~/.cache/pip
        key: ${{ runner.os }}-ipa-cache-${{ hashFiles('.github/workflows/ipachecker.yml') }}
        restore-keys: |
          ${{ runner.os }}-ipa-cache-

    - name: Install tubeup and IA CLI
      run: |
        python -m pip install --upgrade pip
        pip install ipachecker

    - name: Run tubeup
      run: |
        ipachecker "${{ github.event.inputs.url }}"
