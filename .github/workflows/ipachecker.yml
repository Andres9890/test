name: IPA analysis

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'IPA URL to download'
        required: true
        default: 'https://'

jobs:
  anylyize:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v 6.0.2

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v 6.2.0
      with:
        python-version: '3.x'

    - name: Cache pip
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v 5.0.4
      with:
        path: |
          ~/.cache/pip
        key: ${{ runner.os }}-ipa-cache-${{ hashFiles('.github/workflows/ipachecker.yml') }}
        restore-keys: |
          ${{ runner.os }}-ipa-cache-

    - name: Install tubeup and IA CLI
      run: |
        python -m pip install --upgrade pip
        pip install ipachecker

    - name: Run tubeup
      run: |
        ipachecker "${{ github.event.inputs.url }}"
