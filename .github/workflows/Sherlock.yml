name: Sherlock

on:
  workflow_dispatch:
    inputs:
      username:
        description: 'Username to search with Sherlock'
        required: true
        type: string

jobs:
  sherlock-search:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v 6.2.0
        with:
          python-version: '3.x'

      - name: Cache pipx packages and virtualenvs
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v 5.0.4
        with:
          path: |
            ~/.cache/pip
            ~/.local/pipx
            ~/.local/bin
          key: ${{ runner.os }}-pipx-${{ hashFiles('**/sherlock.yml') }}
          restore-keys: |
            ${{ runner.os }}-pipx-

      - name: Install pipx and Sherlock (if not cached)
        run: |
          python3 -m pip install --user pipx
          python3 -m pipx ensurepath
          if ! command -v sherlock &> /dev/null; then
            pipx install sherlock-project
          fi

      - name: Run Sherlock
        run: |
          mkdir -p results
          sherlock "${{ github.event.inputs.username }}" --print-found --output results/output.txt

      - name: Upload results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v 7.0.1
        with:
          name: sherlock-results
          path: results/output.txt
