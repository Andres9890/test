name: Archive Video to IA (multiple)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'video URL to archive'
        required: true
        default: 'https://youtu.be/dQw4w9WgXcQ'

jobs:
  archive:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v 6.0.2

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v 6.2.0
      with:
        python-version: '3.x'

    - name: Install Deno
      run: |
        curl -fsSL https://deno.land/install.sh | sh
        echo "$HOME/.deno/bin" >> $GITHUB_PATH

    - name: Cache pip, yt-dlp, Deno
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v 5.0.5
      with:
        path: |
          ~/.cache/pip
          ~/.cache/yt-dlp
          ~/.deno
        key: ${{ runner.os }}-archive-cache-${{ hashFiles('.github/workflows/tubeup.yml') }}
        restore-keys: |
          ${{ runner.os }}-archive-cache-

    - name: Install ffmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Install tubeup and IA CLI
      run: |
        python -m pip install --upgrade pip
        pip install tubeup internetarchive

    - name: Configure IA CLI
      env:
        IA_EMAIL: ${{ secrets.IA_EMAIL }}
        IA_PASSWORD: ${{ secrets.IA_PASSWORD }}
      run: |
        printf "%s\n%s\n" "$IA_EMAIL" "$IA_PASSWORD" | ia configure

    - name: Setup YouTube cookies
      env:
        YOUTUBE_COOKIES_BASE64: ${{ secrets.YOUTUBE_COOKIES_BASE64 }}
      run: |
        echo "$YOUTUBE_COOKIES_BASE64" | base64 -d > cookies.txt
        chmod 600 cookies.txt

    - name: Run tubeup with cookies (multiple)
      run: |
          while IFS= read -r url; do
          tubeup --cookies=cookies.txt "$url"
          done < urls.txt

    - name: Cleanup cookies
      if: always()
      run: |
        rm -f cookies.txt
